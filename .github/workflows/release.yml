name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxcb-cursor0 \
            libxkbcommon0 \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Install Python tooling
        run: python3 -m pip install -e '.[dev]'

      - name: Lint
        run: python3 -m ruff check src tests

      - name: Compile Python
        run: python3 -m compileall -q src tests

      - name: Test
        run: python3 -m pytest -q

      - name: Audit Python dependencies
        run: python3 -m pip_audit

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Python source artifacts
        run: python3 -m build --sdist --wheel

      - name: Build AppImage
        run: ./scripts/build-appimage.sh "${{ steps.version.outputs.version }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-artifacts
          path: |
            *.AppImage
            dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            *.AppImage
            dist/*
          body_path: docs/release-notes/v1.0.0.md
          draft: false
