<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" stroke="#2a2a4a" stroke-width="2"/>
  <!-- Film strip holes left -->
  <rect x="12" y="20" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="12" y="36" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="12" y="52" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="12" y="68" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="12" y="84" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="12" y="100" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <!-- Film strip holes right -->
  <rect x="108" y="20" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="108" y="36" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="108" y="52" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="108" y="68" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="108" y="84" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <rect x="108" y="100" width="8" height="8" rx="2" fill="#2a2a4a"/>
  <!-- Wrench/tool shape -->
  <g transform="translate(38, 28) rotate(-30, 26, 36)">
    <rect x="20" y="30" width="12" height="40" rx="3" fill="#4a9eff" opacity="0.9"/>
    <circle cx="26" cy="24" r="14" fill="none" stroke="#4a9eff" stroke-width="8" opacity="0.9"/>
    <circle cx="26" cy="24" r="6" fill="url(#bg)"/>
  </g>
  <!-- Play triangle -->
  <polygon points="62,52 62,88 90,70" fill="url(#accent)"/>
  <!-- Audio waveform at bottom -->
  <g transform="translate(30, 100)" opacity="0.7">
    <rect x="0" y="-4" width="3" height="8" rx="1" fill="#2ecc71"/>
    <rect x="6" y="-8" width="3" height="16" rx="1" fill="#2ecc71"/>
    <rect x="12" y="-12" width="3" height="24" rx="1" fill="#2ecc71"/>
    <rect x="18" y="-6" width="3" height="12" rx="1" fill="#2ecc71"/>
    <rect x="24" y="-10" width="3" height="20" rx="1" fill="#2ecc71"/>
    <rect x="30" y="-14" width="3" height="28" rx="1" fill="#2ecc71"/>
    <rect x="36" y="-8" width="3" height="16" rx="1" fill="#2ecc71"/>
    <rect x="42" y="-6" width="3" height="12" rx="1" fill="#2ecc71"/>
    <rect x="48" y="-10" width="3" height="20" rx="1" fill="#2ecc71"/>
    <rect x="54" y="-4" width="3" height="8" rx="1" fill="#2ecc71"/>
    <rect x="60" y="-8" width="3" height="16" rx="1" fill="#2ecc71"/>
  </g>
</svg>
